<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow1" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1A1917" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="800" height="580" rx="16" fill="#F5F4F0"/>
  <text x="400" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#1B4F3A">循環器領域 10疾患群マップ</text>
  <text x="400" y="60" text-anchor="middle" font-size="12" fill="#6B6760">内科J-OSLER 研修手帳準拠｜病歴要約3篇はこの中から選ぶ</text>

  <!-- Row 1: 高頻度3疾患群 -->
  <rect x="30" y="85" width="230" height="80" rx="10" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="2" filter="url(#shadow1)"/>
  <text x="40" y="108" font-size="11" font-weight="bold" fill="#1B4F3A">1</text>
  <text x="55" y="108" font-size="13" font-weight="bold" fill="#1A1917">心不全</text>
  <text x="40" y="126" font-size="11" fill="#6B6760">急性心不全, 慢性心不全,</text>
  <text x="40" y="140" font-size="11" fill="#6B6760">右心不全, 両心不全</text>
  <rect x="170" y="92" width="80" height="22" rx="6" fill="#E8F0EC"/>
  <text x="210" y="107" text-anchor="middle" font-size="10" fill="#1B4F3A">書きやすい</text>

  <rect x="285" y="85" width="230" height="80" rx="10" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="2" filter="url(#shadow1)"/>
  <text x="295" y="108" font-size="11" font-weight="bold" fill="#1B4F3A">3</text>
  <text x="310" y="108" font-size="13" font-weight="bold" fill="#1A1917">虚血性心疾患</text>
  <text x="295" y="126" font-size="11" fill="#6B6760">急性冠症候群, 狭心症,</text>
  <text x="295" y="140" font-size="11" fill="#6B6760">陳旧性心筋梗塞</text>
  <rect x="425" y="92" width="80" height="22" rx="6" fill="#E8F0EC"/>
  <text x="465" y="107" text-anchor="middle" font-size="10" fill="#1B4F3A">書きやすい</text>

  <rect x="540" y="85" width="230" height="80" rx="10" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="2" filter="url(#shadow1)"/>
  <text x="550" y="108" font-size="11" font-weight="bold" fill="#1B4F3A">2</text>
  <text x="565" y="108" font-size="13" font-weight="bold" fill="#1A1917">不整脈</text>
  <text x="550" y="126" font-size="11" fill="#6B6760">心房細動, 心室頻拍,</text>
  <text x="550" y="140" font-size="11" fill="#6B6760">房室ブロック, WPW</text>
  <rect x="680" y="92" width="80" height="22" rx="6" fill="#E8F0EC"/>
  <text x="720" y="107" text-anchor="middle" font-size="10" fill="#1B4F3A">書きやすい</text>

  <!-- Row 2: 中頻度3疾患群 -->
  <rect x="30" y="185" width="230" height="80" rx="10" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="40" y="208" font-size="11" font-weight="bold" fill="#1B4F3A">4</text>
  <text x="55" y="208" font-size="13" font-weight="bold" fill="#1A1917">弁膜疾患</text>
  <text x="40" y="226" font-size="11" fill="#6B6760">大動脈弁狭窄症, 僧帽弁</text>
  <text x="40" y="240" font-size="11" fill="#6B6760">閉鎖不全症, 感染性心内膜炎</text>

  <rect x="285" y="185" width="230" height="80" rx="10" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="295" y="208" font-size="11" font-weight="bold" fill="#1B4F3A">5</text>
  <text x="310" y="208" font-size="13" font-weight="bold" fill="#1A1917">心筋疾患</text>
  <text x="295" y="226" font-size="11" fill="#6B6760">拡張型心筋症, 肥大型心筋症,</text>
  <text x="295" y="240" font-size="11" fill="#6B6760">心筋炎, たこつぼ心筋症</text>

  <rect x="540" y="185" width="230" height="80" rx="10" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="550" y="208" font-size="11" font-weight="bold" fill="#1B4F3A">6</text>
  <text x="565" y="208" font-size="13" font-weight="bold" fill="#1A1917">血圧異常</text>
  <text x="550" y="226" font-size="11" fill="#6B6760">本態性高血圧, 二次性高血圧,</text>
  <text x="550" y="240" font-size="11" fill="#6B6760">高血圧緊急症</text>

  <!-- Row 3: 低頻度4疾患群 -->
  <rect x="30" y="285" width="175" height="80" rx="10" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="40" y="308" font-size="11" font-weight="bold" fill="#1B4F3A">7</text>
  <text x="55" y="308" font-size="13" font-weight="bold" fill="#1A1917">感染性心内膜炎</text>
  <text x="40" y="326" font-size="11" fill="#6B6760">IE, リウマチ熱</text>
  <rect x="40" y="340" width="60" height="18" rx="5" fill="#FEF3C7"/>
  <text x="70" y="353" text-anchor="middle" font-size="9" fill="#92400E">症例希少</text>

  <rect x="222" y="285" width="175" height="80" rx="10" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="232" y="308" font-size="11" font-weight="bold" fill="#1B4F3A">8</text>
  <text x="247" y="308" font-size="13" font-weight="bold" fill="#1A1917">肺血管疾患</text>
  <text x="232" y="326" font-size="11" fill="#6B6760">肺血栓塞栓症,</text>
  <text x="232" y="340" font-size="11" fill="#6B6760">肺高血圧症</text>

  <rect x="414" y="285" width="175" height="80" rx="10" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="424" y="308" font-size="11" font-weight="bold" fill="#1B4F3A">9</text>
  <text x="439" y="308" font-size="12" font-weight="bold" fill="#1A1917">大動脈・末梢血管</text>
  <text x="424" y="326" font-size="11" fill="#6B6760">大動脈解離, 大動脈瘤,</text>
  <text x="424" y="340" font-size="11" fill="#6B6760">閉塞性動脈硬化症</text>

  <rect x="606" y="285" width="164" height="80" rx="10" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="616" y="308" font-size="11" font-weight="bold" fill="#1B4F3A">10</text>
  <text x="635" y="308" font-size="12" font-weight="bold" fill="#1A1917">先天性心血管</text>
  <text x="616" y="326" font-size="11" fill="#6B6760">ASD, VSD,</text>
  <text x="616" y="340" font-size="11" fill="#6B6760">ファロー四徴症</text>
  <rect x="616" y="348" width="60" height="18" rx="5" fill="#FEF3C7"/>
  <text x="646" y="361" text-anchor="middle" font-size="9" fill="#92400E">症例希少</text>

  <!-- 注意 -->
  <rect x="30" y="390" width="740" height="90" rx="10" fill="#E8F0EC" stroke="#1B4F3A" stroke-width="1"/>
  <text x="50" y="415" font-size="13" font-weight="bold" fill="#1B4F3A">循環器3篇のポイント</text>
  <text x="50" y="438" font-size="12" fill="#1A1917">- 消化器と違い「サブ領域」の指定はなし。10疾患群から自由に3つを選べる</text>
  <text x="50" y="456" font-size="12" fill="#1A1917">- 3篇それぞれ異なる疾患群から選ぶこと（例: 心不全+虚血性心疾患+不整脈 はOK）</text>
  <text x="50" y="474" font-size="12" fill="#1A1917">- 心不全・虚血性心疾患・不整脈の3つが最も書きやすくおすすめ</text>

  <!-- Footer -->
  <text x="400" y="520" text-anchor="middle" font-size="10" fill="#6B6760">© 内科ナビ naikanavi.com</text>
</svg>
