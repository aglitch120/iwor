<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Noto Sans JP', sans-serif">
  <rect width="800" height="500" fill="#F5F4F0" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A1917">内科専門医試験 勉強スケジュール</text>
  <text x="400" y="60" text-anchor="middle" font-size="12" fill="#6B6760">3ヶ月プラン（推奨）と1ヶ月プラン</text>

  <text x="60" y="100" font-size="14" font-weight="bold" fill="#1B4F3A">3ヶ月プラン（推奨）</text>
  <rect x="40" y="112" width="720" height="140" rx="8" fill="#FEFEFC" stroke="#DDD9D2"/>

  <rect x="60" y="128" width="210" height="106" rx="6" fill="#E8F0EC" stroke="#1B4F3A" stroke-width="1.5"/>
  <text x="165" y="150" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B4F3A">Phase 1（3-2ヶ月前）</text>
  <text x="165" y="168" text-anchor="middle" font-size="11" fill="#1A1917">基礎固め</text>
  <text x="70" y="188" font-size="10" fill="#6B6760">- QB / 内科専門医問題集で通読</text>
  <text x="70" y="204" font-size="10" fill="#6B6760">- イヤーノートで知識整理</text>
  <text x="70" y="220" font-size="10" fill="#6B6760">- 苦手分野の洗い出し</text>

  <rect x="295" y="128" width="210" height="106" rx="6" fill="#E8F0EC" stroke="#1B4F3A" stroke-width="1.5"/>
  <text x="400" y="150" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B4F3A">Phase 2（2-1ヶ月前）</text>
  <text x="400" y="168" text-anchor="middle" font-size="11" fill="#1A1917">弱点補強 + 演習</text>
  <text x="305" y="188" font-size="10" fill="#6B6760">- 苦手分野を集中的に対策</text>
  <text x="305" y="204" font-size="10" fill="#6B6760">- 模擬試験で実力確認</text>
  <text x="305" y="220" font-size="10" fill="#6B6760">- ガイドライン最新情報確認</text>

  <rect x="530" y="128" width="210" height="106" rx="6" fill="#E8F0EC" stroke="#1B4F3A" stroke-width="1.5"/>
  <text x="635" y="150" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B4F3A">Phase 3（直前1ヶ月）</text>
  <text x="635" y="168" text-anchor="middle" font-size="11" fill="#1A1917">総仕上げ</text>
  <text x="540" y="188" font-size="10" fill="#6B6760">- 間違えた問題の復習</text>
  <text x="540" y="204" font-size="10" fill="#6B6760">- 直近の医師国試問題</text>
  <text x="540" y="220" font-size="10" fill="#6B6760">- セルフトレーニング問題</text>

  <polygon points="275,180 290,172 290,188" fill="#1B4F3A"/>
  <polygon points="510,180 525,172 525,188" fill="#1B4F3A"/>

  <text x="60" y="290" font-size="14" font-weight="bold" fill="#7F1D1D">1ヶ月プラン（最短ルート）</text>
  <rect x="40" y="302" width="720" height="140" rx="8" fill="#FEFEFC" stroke="#DDD9D2"/>

  <rect x="60" y="318" width="150" height="106" rx="6" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="1.5"/>
  <text x="135" y="340" text-anchor="middle" font-size="13" font-weight="bold" fill="#7F1D1D">Week 1-2</text>
  <text x="135" y="358" text-anchor="middle" font-size="11" fill="#1A1917">問題集を1周</text>
  <text x="70" y="378" font-size="10" fill="#6B6760">- QB or 問題集を</text>
  <text x="70" y="394" font-size="10" fill="#6B6760">  高速で1周</text>
  <text x="70" y="410" font-size="10" fill="#6B6760">- 正答率を記録</text>

  <rect x="235" y="318" width="150" height="106" rx="6" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="1.5"/>
  <text x="310" y="340" text-anchor="middle" font-size="13" font-weight="bold" fill="#7F1D1D">Week 3</text>
  <text x="310" y="358" text-anchor="middle" font-size="11" fill="#1A1917">弱点集中</text>
  <text x="245" y="378" font-size="10" fill="#6B6760">- 正答率の低い分野</text>
  <text x="245" y="394" font-size="10" fill="#6B6760">  を重点的に復習</text>
  <text x="245" y="410" font-size="10" fill="#6B6760">- 模試で実力確認</text>

  <rect x="410" y="318" width="150" height="106" rx="6" fill="#FEE2E2" stroke="#7F1D1D" stroke-width="1.5"/>
  <text x="485" y="340" text-anchor="middle" font-size="13" font-weight="bold" fill="#7F1D1D">Week 4</text>
  <text x="485" y="358" text-anchor="middle" font-size="11" fill="#1A1917">最終確認</text>
  <text x="420" y="378" font-size="10" fill="#6B6760">- 間違えた問題のみ</text>
  <text x="420" y="394" font-size="10" fill="#6B6760">  繰り返し</text>
  <text x="420" y="410" font-size="10" fill="#6B6760">- 当日の持ち物準備</text>

  <rect x="585" y="318" width="150" height="106" rx="6" fill="#DCFCE7" stroke="#166534" stroke-width="1.5"/>
  <text x="660" y="346" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">試験当日</text>
  <text x="660" y="370" text-anchor="middle" font-size="11" fill="#1A1917">9:00 - 16:40</text>
  <text x="660" y="394" text-anchor="middle" font-size="10" fill="#6B6760">全3時限</text>
  <text x="660" y="410" text-anchor="middle" font-size="10" fill="#6B6760">マークシート形式</text>

  <polygon points="215,370 230,362 230,378" fill="#7F1D1D"/>
  <polygon points="390,370 405,362 405,378" fill="#7F1D1D"/>
  <polygon points="565,370 580,362 580,378" fill="#166534"/>

  <text x="400" y="478" text-anchor="middle" font-size="11" fill="#6B6760">※ 日常診療と並行するため、1日1-2時間の勉強時間を確保することが重要</text>
  <text x="400" y="495" text-anchor="middle" font-size="10" fill="#C8C4BC">© 内科ナビ naikanavi.com</text>
</svg>