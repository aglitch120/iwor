<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'Helvetica Neue', Arial, sans-serif">
  <rect width="800" height="480" fill="#F5F4F0" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A1917">内科専門医試験 過去問・問題集の活用ロードマップ</text>
  <line x1="60" y1="52" x2="740" y2="52" stroke="#DDD9D2" stroke-width="1"/>
  <rect x="40" y="70" width="220" height="170" rx="10" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="2"/>
  <rect x="40" y="70" width="220" height="36" rx="10" fill="#1B4F3A"/>
  <rect x="40" y="88" width="220" height="18" fill="#1B4F3A"/>
  <text x="150" y="94" text-anchor="middle" font-size="14" font-weight="bold" fill="#FEFEFC">STEP 1: 公式過去問</text>
  <text x="60" y="126" font-size="12" fill="#1A1917">認定内科医・総合内科専門医</text>
  <text x="60" y="144" font-size="12" fill="#1A1917">過去問題集 第1集・第2集</text>
  <text x="60" y="168" font-size="11" fill="#6B6760">問題数: 計650題</text>
  <text x="60" y="184" font-size="11" fill="#6B6760">費用: 第1集5,000円 / 第2集6,000円</text>
  <text x="60" y="200" font-size="11" fill="#6B6760">入手先: 日本内科学会HP</text>
  <text x="60" y="222" font-size="11" fill="#7F1D1D" font-weight="bold">出題傾向の把握に必須</text>
  <path d="M260 155 L290 155" stroke="#1B4F3A" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#1B4F3A"/>
    </marker>
  </defs>
  <rect x="290" y="70" width="220" height="170" rx="10" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="2"/>
  <rect x="290" y="70" width="220" height="36" rx="10" fill="#2D6A4F"/>
  <rect x="290" y="88" width="220" height="18" fill="#2D6A4F"/>
  <text x="400" y="94" text-anchor="middle" font-size="14" font-weight="bold" fill="#FEFEFC">STEP 2: QB + QC</text>
  <text x="310" y="126" font-size="12" fill="#1A1917">QBオンライン内科専門医試験</text>
  <text x="310" y="144" font-size="12" fill="#1A1917">+ Quick Check (イヤーノート付録)</text>
  <text x="310" y="168" font-size="11" fill="#6B6760">問題数: QB数百題 + QC一問一答</text>
  <text x="310" y="184" font-size="11" fill="#6B6760">費用: セット44,000円</text>
  <text x="310" y="200" font-size="11" fill="#6B6760">(Q-Assist講義動画付き)</text>
  <text x="310" y="222" font-size="11" fill="#7F1D1D" font-weight="bold">知識の補強と弱点発見</text>
  <path d="M510 155 L540 155" stroke="#1B4F3A" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <rect x="540" y="70" width="220" height="170" rx="10" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="2"/>
  <rect x="540" y="70" width="220" height="36" rx="10" fill="#3D5A80"/>
  <rect x="540" y="88" width="220" height="18" fill="#3D5A80"/>
  <text x="650" y="94" text-anchor="middle" font-size="14" font-weight="bold" fill="#FEFEFC">STEP 3: 模試・実戦</text>
  <text x="560" y="126" font-size="12" fill="#1A1917">CareNeTV バーチャル模試</text>
  <text x="560" y="144" font-size="12" fill="#1A1917">THE内科専門医問題集 Ver.2</text>
  <text x="560" y="168" font-size="11" fill="#6B6760">模試180問 / 問題集約600問</text>
  <text x="560" y="184" font-size="11" fill="#6B6760">費用: CareNeTV月額 / 書籍各巻</text>
  <text x="560" y="200" font-size="11" fill="#6B6760">+ WEB内科塾 1,600問超</text>
  <text x="560" y="222" font-size="11" fill="#7F1D1D" font-weight="bold">本番形式での仕上げ</text>
  <rect x="40" y="270" width="720" height="80" rx="10" fill="#E8F0EC" stroke="#1B4F3A" stroke-width="1.5"/>
  <text x="60" y="296" font-size="13" font-weight="bold" fill="#1B4F3A">補助教材（余裕があれば）</text>
  <text x="60" y="318" font-size="12" fill="#1A1917">セルフトレーニング問題集（第5集）/ 出るズバ! BOOK / 復元問題（SNS・note）/ 最新の医師国家試験問題</text>
  <text x="60" y="338" font-size="11" fill="#6B6760">※ セルフトレーニング問題集は難易度が高く、内科専門医試験対策としてはオーバーワークとの声もあり</text>
  <rect x="40" y="370" width="720" height="80" rx="10" fill="#FEF3C7" stroke="#92400E" stroke-width="1.5"/>
  <text x="60" y="396" font-size="13" font-weight="bold" fill="#92400E">注意: 消化不良を避ける</text>
  <text x="60" y="418" font-size="12" fill="#1A1917">教材を広げすぎると逆効果。STEP 1 → 2 を2〜3周して完璧にすることが最優先。</text>
  <text x="60" y="438" font-size="12" fill="#1A1917">STEP 3 は時間に余裕がある場合のみ。間違えた問題の復習 > 新しい教材に手を出す。</text>
  <text x="400" y="472" text-anchor="middle" font-size="10" fill="#6B6760">© 内科ナビ naikanavi.com</text>
</svg>