  <rect x="370" y="210" width="130" height="28" rx="4" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="435" y="229" text-anchor="middle" font-size="10" fill="#991B1B">第3回のみ大幅低下</text>
  <text x="400" y="400" text-anchor="middle" font-size="11" fill="#6B6760">※ 新制度（J-OSLER世代）の合格率。旧制度受験者を含む全体合格率とは異なる</text>
  <text x="400" y="415" text-anchor="middle" font-size="10" fill="#C8C4BC">© 内科ナビ naikanavi.com</text>
