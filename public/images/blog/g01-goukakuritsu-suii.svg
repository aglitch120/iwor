<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="'Noto Sans JP', sans-serif">
  <rect width="800" height="420" fill="#F5F4F0" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A1917">内科専門医試験（新制度）合格率の推移</text>
  <rect x="60" y="55" width="700" height="300" fill="#FEFEFC" rx="8" stroke="#DDD9D2" stroke-width="1"/>
  <line x1="100" y1="320" x2="720" y2="320" stroke="#C8C4BC" stroke-width="1.5"/>
  <line x1="100" y1="80" x2="100" y2="320" stroke="#C8C4BC" stroke-width="1.5"/>
  <text x="90" y="90" text-anchor="end" font-size="11" fill="#6B6760">100%</text>
  <line x1="100" y1="85" x2="720" y2="85" stroke="#E8E5DF" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="90" y="138" text-anchor="end" font-size="11" fill="#6B6760">95%</text>
  <line x1="100" y1="132" x2="720" y2="132" stroke="#E8E5DF" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="90" y="185" text-anchor="end" font-size="11" fill="#6B6760">90%</text>
  <line x1="100" y1="179" x2="720" y2="179" stroke="#E8E5DF" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="90" y="232" text-anchor="end" font-size="11" fill="#6B6760">85%</text>
  <line x1="100" y1="226" x2="720" y2="226" stroke="#E8E5DF" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="90" y="280" text-anchor="end" font-size="11" fill="#6B6760">80%</text>
  <line x1="100" y1="273" x2="720" y2="273" stroke="#E8E5DF" stroke-width="0.5" stroke-dasharray="4"/>
  <g>
    <rect x="145" y="82" width="80" height="238" rx="4" fill="#1B4F3A" opacity="0.85"/>
    <text x="185" y="74" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B4F3A">94.5%</text>
    <text x="185" y="340" text-anchor="middle" font-size="12" fill="#6B6760">第1回</text>
    <text x="185" y="355" text-anchor="middle" font-size="10" fill="#6B6760">2021年</text>
  </g>
  <g>
    <rect x="270" y="132" width="80" height="188" rx="4" fill="#1B4F3A" opacity="0.85"/>
    <text x="310" y="124" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B4F3A">90.0%</text>
    <text x="310" y="340" text-anchor="middle" font-size="12" fill="#6B6760">第2回</text>
    <text x="310" y="355" text-anchor="middle" font-size="10" fill="#6B6760">2022年</text>
  </g>
  <g>
    <rect x="395" y="226" width="80" height="94" rx="4" fill="#7F1D1D" opacity="0.85"/>
    <text x="435" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="#7F1D1D">85.3%</text>
    <text x="435" y="340" text-anchor="middle" font-size="12" fill="#6B6760">第3回</text>
    <text x="435" y="355" text-anchor="middle" font-size="10" fill="#6B6760">2023年</text>
  </g>
  <g>
    <rect x="520" y="90" width="80" height="230" rx="4" fill="#1B4F3A" opacity="0.85"/>
    <text x="560" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B4F3A">93.6%</text>
    <text x="560" y="340" text-anchor="middle" font-size="12" fill="#6B6760">第4回</text>
    <text x="560" y="355" text-anchor="middle" font-size="10" fill="#6B6760">2024年</text>
  </g>
  <g>
    <rect x="645" y="78" width="80" height="242" rx="4" fill="#2D6A4F" opacity="0.85"/>
    <text x="685" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#2D6A4F">95.6%</text>
