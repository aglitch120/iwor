<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow2" x="-2%" y="-2%" width="104%\" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1A1917" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="800" height="480" rx="16" fill="#F5F4F0"/>
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1B4F3A">循環器3篇 おすすめ組み合わせパターン</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#6B6760">3篇それぞれ異なる疾患群から選ぶこと</text>

  <!-- Pattern A: 王道 -->
  <rect x="30" y="80" width="740" height="105" rx="12" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="2" filter="url(#shadow2)"/>
  <rect x="30" y="80" width="100" height="105" rx="12" fill="#1B4F3A"/>
  <rect x="118" y="80" width="0" height="105" fill="#1B4F3A"/>
  <text x="80" y="125" text-anchor="middle" font-size="15" font-weight="bold" fill="#FEFEFC">Pattern A</text>
  <text x="80" y="145" text-anchor="middle" font-size="12" fill="#E8F0EC">王道</text>
  <rect x="150" y="100" width="180" height="50" rx="8" fill="#E8F0EC"/>
  <text x="240" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B4F3A">心不全</text>
  <text x="240" y="137" text-anchor="middle" font-size="10" fill="#6B6760">急性心不全が書きやすい</text>
  <text x="345" y="125" font-size="18" fill="#DDD9D2">+</text>
  <rect x="370" y="100" width="180" height="50" rx="8" fill="#E8F0EC"/>
  <text x="460" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B4F3A">虚血性心疾患</text>
  <text x="460" y="137" text-anchor="middle" font-size="10" fill="#6B6760">ACS or 狭心症</text>
  <text x="565" y="125" font-size="18" fill="#DDD9D2">+</text>
  <rect x="590" y="100" width="160" height="50" rx="8" fill="#E8F0EC"/>
  <text x="670" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B4F3A">不整脈</text>
  <text x="670" y="137" text-anchor="middle" font-size="10" fill="#6B6760">心房細動が定番</text>

  <!-- Pattern B: 循環器志望 -->
  <rect x="30" y="200" width="740" height="105" rx="12" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5" filter="url(#shadow2)"/>
  <rect x="30" y="200" width="100" height="105" rx="12" fill="#3D5A80"/>
  <text x="80" y="245" text-anchor="middle" font-size="15" font-weight="bold" fill="#FEFEFC">Pattern B</text>
  <text x="80" y="265" text-anchor="middle" font-size="11" fill="#E8F0EC">循環器志望</text>
  <rect x="150" y="220" width="180" height="50" rx="8" fill="#E8F0EC"/>
  <text x="240" y="240" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B4F3A">心不全</text>
  <text x="240" y="257" text-anchor="middle" font-size="10" fill="#6B6760">HFrEF or HFpEF</text>
  <text x="345" y="245" font-size="18" fill="#DDD9D2">+</text>
  <rect x="370" y="220" width="180" height="50" rx="8" fill="#E8F0EC"/>
  <text x="460" y="240" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B4F3A">心筋疾患</text>
  <text x="460" y="257" text-anchor="middle" font-size="10" fill="#6B6760">DCM or HCM</text>
  <text x="565" y="245" font-size="18" fill="#DDD9D2">+</text>
  <rect x="590" y="220" width="160" height="50" rx="8" fill="#E8F0EC"/>
  <text x="670" y="240" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B4F3A">弁膜疾患</text>
  <text x="670" y="257" text-anchor="middle" font-size="10" fill="#6B6760">AS or MR</text>

  <!-- Pattern C: 非循環器 -->
  <rect x="30" y="320" width="740" height="105" rx="12" fill="#FEFEFC" stroke="#DDD9D2" stroke-width="1.5" filter="url(#shadow2)"/>
  <rect x="30" y="320" width="100" height="105" rx="12" fill="#6B6760"/>
  <text x="80" y="365" text-anchor="middle" font-size="15" font-weight="bold" fill="#FEFEFC">Pattern C</text>
  <text x="80" y="385" text-anchor="middle" font-size="11" fill="#E8E5DF">非循環器</text>
  <rect x="150" y="340" width="180" height="50" rx="8" fill="#E8F0EC"/>
  <text x="240" y="360" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B4F3A">心不全</text>
  <text x="240" y="377" text-anchor="middle" font-size="10" fill="#6B6760">併存疾患として頻出</text>
  <text x="345" y="365" font-size="18" fill="#DDD9D2">+</text>
  <rect x="370" y="340" width="180" height="50" rx="8" fill="#E8F0EC"/>
  <text x="460" y="360" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B4F3A">虚血性心疾患</text>
  <text x="460" y="377" text-anchor="middle" font-size="10" fill="#6B6760">救急入院が多い</text>
  <text x="565" y="365" font-size="18" fill="#DDD9D2">+</text>
  <rect x="590" y="340" width="160" height="50" rx="8" fill="#E8F0EC"/>
  <text x="670" y="360" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B4F3A">肺血管疾患</text>
  <text x="670" y="377" text-anchor="middle" font-size="10" fill="#6B6760">PTE/DVT</text>

  <!-- Footer -->
  <text x="400" y="460" text-anchor="middle" font-size="10" fill="#6B6760">© 内科ナビ naikanavi.com</text>
</svg>
