<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="'Noto Sans JP', sans-serif">
  <rect width="800" height="460" fill="#F5F4F0" rx="12"/>
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A1917">内科専門医試験 おすすめ教材マップ</text>

  <text x="60" y="78" font-size="14" font-weight="bold" fill="#7F1D1D">必須教材（まずこれから）</text>
  <rect x="40" y="90" width="340" height="130" rx="8" fill="#FEFEFC" stroke="#7F1D1D" stroke-width="1.5"/>
  <circle cx="66" cy="118" r="14" fill="#7F1D1D"/>
  <text x="66" y="122" text-anchor="middle" font-size="11" font-weight="bold" fill="white">1</text>
  <text x="88" y="122" font-size="13" font-weight="bold" fill="#1A1917">QB / QC（クエスチョン・バンク）</text>
  <text x="88" y="140" font-size="10" fill="#6B6760">国試レベルの基礎を効率的に総復習</text>
  <text x="88" y="155" font-size="10" fill="#6B6760">内科全領域をカバー。まず1周することが最優先</text>

  <circle cx="66" cy="186" r="14" fill="#7F1D1D"/>
  <text x="66" y="190" text-anchor="middle" font-size="11" font-weight="bold" fill="white">2</text>
  <text x="88" y="190" font-size="13" font-weight="bold" fill="#1A1917">イヤーノート</text>
  <text x="88" y="208" font-size="10" fill="#6B6760">辞書的に使用。問題演習中の知識確認に</text>

  <text x="440" y="78" font-size="14" font-weight="bold" fill="#1B4F3A">推奨教材（余裕があれば）</text>
  <rect x="420" y="90" width="340" height="130" rx="8" fill="#FEFEFC" stroke="#1B4F3A" stroke-width="1.5"/>
  <circle cx="446" cy="118" r="14" fill="#1B4F3A"/>
  <text x="446" y="122" text-anchor="middle" font-size="11" font-weight="bold" fill="white">3</text>
  <text x="468" y="122" font-size="13" font-weight="bold" fill="#1A1917">CareNeTV バーチャル模試</text>
  <text x="468" y="140" font-size="10" fill="#6B6760">本番形式180問。弱点の可視化に最適</text>

  <circle cx="446" cy="164" r="14" fill="#1B4F3A"/>
  <text x="446" y="168" text-anchor="middle" font-size="11" font-weight="bold" fill="white">4</text>
  <text x="468" y="168" font-size="13" font-weight="bold" fill="#1A1917">直近の医師国家試験問題</text>
  <text x="468" y="186" font-size="10" fill="#6B6760">試験内容の重複が多い。トレンド把握にも有効</text>

  <circle cx="446" cy="206" r="14" fill="#1B4F3A"/>
  <text x="446" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="white">5</text>
  <text x="468" y="210" font-size="13" font-weight="bold" fill="#1A1917">セルフトレーニング問題</text>
  <text x="468" y="228" font-size="10" fill="#6B6760">日本内科学会公式。出題傾向の参考に</text>

  <text x="60" y="260" font-size="14" font-weight="bold" fill="#4338CA">補助教材（特定の目的に）</text>
  <rect x="40" y="272" width="720" height="100" rx="8" fill="#FEFEFC" stroke="#DDD9D2"/>
  <rect x="60" y="288" width="200" height="68" rx="6" fill="#E8F0EC"/>
  <text x="160" y="310" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B4F3A">動画講義</text>
  <text x="160" y="328" text-anchor="middle" font-size="10" fill="#6B6760">CareNeTV出るズバ</text>
  <text x="160" y="344" text-anchor="middle" font-size="10" fill="#6B6760">ドクスタ Quickサマライズ</text>

  <rect x="280" y="288" width="220" height="68" rx="6" fill="#E8F0EC"/>
  <text x="390" y="310" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B4F3A">学会公式教材</text>
  <text x="390" y="328" text-anchor="middle" font-size="10" fill="#6B6760">認定医・総合内科専門医 過去問題集</text>
  <text x="390" y="344" text-anchor="middle" font-size="10" fill="#6B6760">生涯教育のためのセルフトレーニング</text>

  <rect x="520" y="288" width="220" height="68" rx="6" fill="#E8F0EC"/>
  <text x="630" y="310" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B4F3A">ガイドライン</text>
  <text x="630" y="328" text-anchor="middle" font-size="10" fill="#6B6760">各領域の最新ガイドライン</text>
  <text x="630" y="344" text-anchor="middle" font-size="10" fill="#6B6760">特に改訂直後のものに注意</text>

  <rect x="120" y="392" width="560" height="36" rx="6" fill="#FEF3C7" stroke="#FCD34D"/>
  <text x="400" y="415" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400E">教材を広げすぎず、限られた教材を完璧にすることが合格への近道</text>

  <text x="400" y="452" text-anchor="middle" font-size="10" fill="#C8C4BC">© 内科ナビ naikanavi.com</text>
</svg>